<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>UniCollab - Group Assignment System</title>

    <style>
      /* ======================================================
GLOBAL STYLE
======================================================*/

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #f4f6f9;
        color: #333;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background: #2c7be5;
        color: white;
        padding: 12px 20px;
        font-size: 20px;
        font-weight: bold;
      }

      .container {
        flex: 1;
        display: grid;
        grid-template-columns: 250px 1fr 300px;
        overflow: hidden;
      }

      /* ======================================================
SIDEBAR
======================================================*/

      .sidebar {
        background: #ffffff;
        border-right: 1px solid #ddd;
        padding: 15px;
        overflow: auto;
      }

      .sidebar h3 {
        margin-bottom: 10px;
      }

      .channel {
        padding: 6px;
        cursor: pointer;
        border-radius: 4px;
      }

      .channel:hover {
        background: #e8f0ff;
      }

      /* ======================================================
CHAT AREA
======================================================*/

      .chat {
        display: flex;
        flex-direction: column;
        border-right: 1px solid #ddd;
      }

      .chat-messages {
        flex: 1;
        padding: 15px;
        overflow: auto;
      }

      .message {
        margin-bottom: 10px;
      }

      .message .user {
        font-weight: bold;
      }

      .message .time {
        font-size: 10px;
        color: #888;
      }

      .chat-input {
        display: flex;
        border-top: 1px solid #ddd;
      }

      .chat-input input {
        flex: 1;
        padding: 10px;
        border: none;
        outline: none;
      }

      .chat-input button {
        padding: 10px 15px;
        background: #2c7be5;
        color: white;
        border: none;
        cursor: pointer;
      }

      /* ======================================================
RIGHT PANEL
======================================================*/

      .right-panel {
        background: #fff;
        overflow: auto;
        padding: 15px;
      }

      /* ======================================================
TASK BOARD
======================================================*/

      .board {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 10px;
      }

      .column {
        background: #f9fafc;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 10px;
        min-height: 200px;
      }

      .column h4 {
        margin-bottom: 10px;
      }

      .task {
        background: white;
        border: 1px solid #ccc;
        padding: 8px;
        margin-bottom: 8px;
        border-radius: 4px;
        cursor: grab;
      }

      .task small {
        display: block;
        font-size: 10px;
        color: #666;
      }

      /* ======================================================
CONTRIBUTION
======================================================*/

      .member {
        margin-bottom: 10px;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }

      .progress {
        height: 8px;
        background: #eee;
        margin-top: 5px;
      }

      .progress div {
        height: 8px;
        background: #2c7be5;
      }

      /* ======================================================
FILES
======================================================*/

      .file {
        padding: 6px;
        border-bottom: 1px solid #ddd;
      }

      .file input {
        display: none;
      }

      .upload {
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <header>UniCollab – Group Assignment System</header>

    <div class="container">
      <!-- =====================================================
SIDEBAR
===================================================== -->

      <div class="sidebar">
        <h3>Channels</h3>

        <div class="channel" onclick="switchChannel('general')">#general</div>
        <div class="channel" onclick="switchChannel('research')">#research</div>
        <div class="channel" onclick="switchChannel('coding')">#coding</div>

        <h3 style="margin-top: 20px">Direct Messages</h3>

        <div class="channel" onclick="switchChannel('dm-alex')">Alex</div>
        <div class="channel" onclick="switchChannel('dm-sara')">Sara</div>
        <div class="channel" onclick="switchChannel('dm-liam')">Liam</div>
      </div>

      <!-- =====================================================
CHAT AREA
===================================================== -->

      <div class="chat">
        <div class="chat-messages" id="messages"></div>

        <div class="chat-input">
          <input id="msgInput" placeholder="Type message" />
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>

      <!-- =====================================================
RIGHT PANEL
===================================================== -->

      <div class="right-panel">
        <h3>Task Board</h3>

        <div class="board">
          <div
            class="column"
            id="todo"
            ondrop="drop(event)"
            ondragover="allowDrop(event)"
          >
            <h4>To Do</h4>
          </div>

          <div
            class="column"
            id="progress"
            ondrop="drop(event)"
            ondragover="allowDrop(event)"
          >
            <h4>In Progress</h4>
          </div>

          <div
            class="column"
            id="done"
            ondrop="drop(event)"
            ondragover="allowDrop(event)"
          >
            <h4>Completed</h4>
          </div>
        </div>

        <h3 style="margin-top: 20px">Contribution Tracker</h3>

        <div id="members"></div>

        <h3 style="margin-top: 20px">Files</h3>

        <input
          id="searchFile"
          placeholder="Search file"
          oninput="searchFiles()"
        />

        <div id="files"></div>

        <div class="upload">
          <input type="file" id="fileUpload" />
          <button onclick="uploadFile()">Upload</button>
        </div>
      </div>
    </div>

    <script>
      /* ======================================================
DATA MODELS
======================================================*/

      let users = [
        {
          name: "Alex",
          skills: ["coding", "research"],
          tasksAssigned: 0,
          tasksCompleted: 0,
          messages: 0,
          updates: 0,
        },
        {
          name: "Sara",
          skills: ["writing", "presentation"],
          tasksAssigned: 0,
          tasksCompleted: 0,
          messages: 0,
          updates: 0,
        },
        {
          name: "Liam",
          skills: ["coding", "presentation"],
          tasksAssigned: 0,
          tasksCompleted: 0,
          messages: 0,
          updates: 0,
        },
      ];

      let tasks = [
        {
          id: 1,
          title: "Research Topic",
          skills: ["research"],
          priority: "High",
          deadline: "2026-04-01",
          status: "todo",
        },
        {
          id: 2,
          title: "Develop Prototype",
          skills: ["coding"],
          priority: "High",
          deadline: "2026-04-10",
          status: "todo",
        },
      ];

      let files = [
        { name: "report.pdf" },
        { name: "slides.pptx" },
        { name: "diagram.png" },
      ];

      let channels = {
        general: [],
        research: [],
        coding: [],
        "dm-alex": [],
        "dm-sara": [],
        "dm-liam": [],
      };

      let currentChannel = "general";

      /* ======================================================
CHAT SYSTEM
======================================================*/

      function switchChannel(name) {
        currentChannel = name;
        renderMessages();
      }

      function sendMessage() {
        let input = document.getElementById("msgInput");
        let text = input.value.trim();

        if (!text) return;

        let msg = {
          user: "You",
          text: text,
          time: new Date().toLocaleTimeString(),
        };

        channels[currentChannel].push(msg);

        users[0].messages++;

        input.value = "";

        renderMessages();
        updateContribution();
      }

      function renderMessages() {
        let box = document.getElementById("messages");

        box.innerHTML = "";

        channels[currentChannel].forEach((m) => {
          let div = document.createElement("div");
          div.className = "message";

          div.innerHTML =
            "<span class='user'>" +
            m.user +
            "</span>: " +
            m.text +
            "<div class='time'>" +
            m.time +
            "</div>";

          box.appendChild(div);
        });
      }

      /* ======================================================
AI TASK DELEGATOR
======================================================*/

      function assignTask(task) {
        let bestUser = null;
        let bestScore = -999;

        users.forEach((u) => {
          let skillMatch = task.skills.filter((s) =>
            u.skills.includes(s)
          ).length;

          let workload = u.tasksAssigned - u.tasksCompleted;

          let score = skillMatch * 10 - workload * 2;

          if (score > bestScore) {
            bestScore = score;
            bestUser = u;
          }
        });

        task.assigned = bestUser.name;
        bestUser.tasksAssigned++;
      }

      /* ======================================================
TASK BOARD
======================================================*/

      function renderTasks() {
        ["todo", "progress", "done"].forEach((id) => {
          document.getElementById(id).innerHTML =
            "<h4>" +
            (id === "todo"
              ? "To Do"
              : id === "progress"
              ? "In Progress"
              : "Completed") +
            "</h4>";
        });

        tasks.forEach((task) => {
          if (!task.assigned) assignTask(task);

          let div = document.createElement("div");
          div.className = "task";
          div.draggable = true;
          div.id = "task" + task.id;

          div.ondragstart = drag;

          div.innerHTML =
            "<b>" +
            task.title +
            "</b>" +
            "<small>Assigned: " +
            task.assigned +
            "</small>" +
            "<small>Deadline: " +
            task.deadline +
            "</small>" +
            "<small>Priority: " +
            task.priority +
            "</small>";

          document.getElementById(task.status).appendChild(div);
        });
      }

      /* ======================================================
DRAG DROP
======================================================*/

      function allowDrop(ev) {
        ev.preventDefault();
      }

      function drag(ev) {
        ev.dataTransfer.setData("text", ev.target.id);
      }

      function drop(ev) {
        ev.preventDefault();

        let data = ev.dataTransfer.getData("text");

        let el = document.getElementById(data);

        ev.target.appendChild(el);

        let id = parseInt(data.replace("task", ""));

        let task = tasks.find((t) => t.id === id);

        task.status = ev.target.id;

        if (task.status === "done") {
          let u = users.find((x) => x.name === task.assigned);

          u.tasksCompleted++;
          u.updates++;
        }

        updateContribution();
      }

      /* ======================================================
CONTRIBUTION TRACKER
======================================================*/

      function updateContribution() {
        let total = 0;

        users.forEach((u) => {
          total +=
            u.tasksCompleted * 5 +
            u.tasksAssigned * 2 +
            u.messages * 1 +
            u.updates * 2;
        });

        let box = document.getElementById("members");
        box.innerHTML = "";

        users.forEach((u) => {
          let score =
            u.tasksCompleted * 5 +
            u.tasksAssigned * 2 +
            u.messages * 1 +
            u.updates * 2;

          let percent = Math.round((score / total) * 100) || 0;

          let div = document.createElement("div");
          div.className = "member";

          div.innerHTML =
            "<b>" +
            u.name +
            "</b>" +
            "<div>Completed: " +
            u.tasksCompleted +
            "</div>" +
            "<div>Assigned: " +
            u.tasksAssigned +
            "</div>" +
            "<div>Messages: " +
            u.messages +
            "</div>" +
            "<div>" +
            percent +
            "%</div>" +
            "<div class='progress'><div style='width:" +
            percent +
            "%'></div></div>";

          box.appendChild(div);
        });
      }

      /* ======================================================
FILES
======================================================*/

      function renderFiles() {
        let box = document.getElementById("files");

        box.innerHTML = "";

        files.forEach((f) => {
          let div = document.createElement("div");
          div.className = "file";
          div.innerText = f.name;

          box.appendChild(div);
        });
      }

      function uploadFile() {
        let input = document.getElementById("fileUpload");

        if (input.files.length === 0) return;

        files.push({ name: input.files[0].name });

        renderFiles();
      }

      function searchFiles() {
        let q = document.getElementById("searchFile").value.toLowerCase();

        let box = document.getElementById("files");
        box.innerHTML = "";

        files
          .filter((f) => f.name.toLowerCase().includes(q))
          .forEach((f) => {
            let div = document.createElement("div");
            div.className = "file";
            div.innerText = f.name;

            box.appendChild(div);
          });
      }

      /* ======================================================
INITIALIZE
======================================================*/

      renderMessages();
      renderTasks();
      renderFiles();
      updateContribution();
    </script>
  </body>
</html>
